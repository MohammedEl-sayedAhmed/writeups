name: Send Webmentions

# Walks every committed post on main and asks each post's outgoing links
# whether they accept webmentions, then sends one. Webmention.io and the
# receiving endpoints dedupe by (source, target) pairs so re-runs are safe.
on:
  push:
    branches: [main]
    paths:
      - 'src/content/blog/**'

# Default-deny at workflow level. The job below grants nothing extra — this
# workflow only makes outbound HTTPS POSTs to webmention endpoints.
permissions: {}

concurrency:
  group: send-webmentions-${{ github.ref }}
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      # Cloudflare Pages deploys finish ~30-60s after a push. Sleep so the
      # live source pages reflect the latest commit before remote endpoints
      # fetch them. (CF webhook -> poll loop would be cleaner; this is a 90s
      # fallback that has been good enough in practice.)
      - name: Wait for Cloudflare Pages deploy
        run: sleep 90

      - name: Send outbound webmentions for every post
        run: |
          set -e
          shopt -s nullglob
          for f in src/content/blog/*.md; do
            slug=$(basename "$f" .md)
            url="https://mammar.pages.dev/blog/${slug}/"
            echo "-> $url"
            npx --yes @remy/webmention "$url" --send --limit 100 \
              || echo "::warning::send failed for $url"
          done
