name: Cross-post to dev.to

# Paused 2026-05-23: the auto-trigger is disabled while we triage two
# composition issues against dev.to and against this repo's branch
# protection on main:
#
#   1. dev.to returned HTTP 422 on the Clipman writeup's initial publish
#      even after the tag set was reduced to four lowercase-alphanumeric
#      entries (see PR #20 + run 26317495543). At least one more body-side
#      validation is failing and the action does not surface dev.to's
#      response body, so we need a separate manual reproduction with
#      DEVTO_TOKEN to identify the real cause.
#
#   2. main is a protected branch that requires changes via PR. Both
#      publish-devto's id-writeback push and our own restore-rich-tags
#      push were rejected by GH006. The workflow needs to commit through
#      a PR rather than direct-to-main before it can be re-enabled.
#
# The push trigger is intentionally removed for now; the workflow is
# only invocable manually via workflow_dispatch so the maintainer can
# re-run it deliberately during triage. Once both issues are resolved
# the push trigger should be restored.
on:
  workflow_dispatch:

# Default-deny at workflow level; the one job below grants only the minimum it needs.
# Defense in depth: a step that doesn't declare permissions inherits nothing.
permissions: {}

# Prevent two simultaneous publishes from racing on the same post.
# cancel-in-progress: false → in-flight runs finish; new ones queue.
concurrency:
  group: crosspost-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    # Cap blast radius if anything stalls or loops.
    timeout-minutes: 10

    # Least-privilege: only `contents: write` (needed so the action can commit
    # the dev.to article id back to frontmatter). No issues, no PRs, no packages.
    permissions:
      contents: write

    steps:
      - name: Skip if DEVTO_TOKEN is not configured
        id: gate
        env:
          # Secret is injected via env, never interpolated into the shell directly.
          DEVTO_TOKEN: ${{ secrets.DEVTO_TOKEN }}
        run: |
          if [ -z "$DEVTO_TOKEN" ]; then
            echo "::warning::DEVTO_TOKEN secret is not set — skipping cross-post."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Actions are pinned to commit SHA (not tag) so a compromise of the upstream
      # repo cannot silently retarget what we run. The trailing `# vX.Y.Z` comment
      # is the standard convention Dependabot reads to bump the pin.
      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # dev.to's article API caps tags at 4 entries and rejects anything that
      # isn't lowercase-alphanumeric (no hyphens). The site's `tags:` field
      # can be richer. When a post sets a `devto_tags:` value in its
      # frontmatter, swap `tags` to that lean value before publish-devto
      # sees it; restore afterwards in a separate commit so main keeps the
      # rich site-side set.
      - name: Swap rich tags -> devto_tags for crosspost
        if: steps.gate.outputs.skip != 'true'
        run: |
          python3 .github/scripts/swap-tags.py to-devto \
            $(find src/content/blog -name '*.md' -print)

      - name: Publish articles to dev.to
        if: steps.gate.outputs.skip != 'true'
        uses: sinedied/publish-devto@c713cc0934b35cb3df9fca759b98e36e6a540a85 # v2
        with:
          devto_key: ${{ secrets.DEVTO_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          files: 'src/content/blog/**/*.md'
          branch: main
          conventional_commits: true

      # Always run: even on publish failure we want the rich `tags:` value
      # back on disk so the next workflow invocation does not see a swapped
      # file. publish-devto commits only on success, so on failure this
      # step is a no-op as far as git history goes (the working tree gets
      # reset to the rich set and nothing is pushed).
      - name: Restore rich tags after crosspost
        if: always() && steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # Pull whatever publish-devto just pushed (the lean-tags + id
          # commit) so our restore lands on top of it cleanly.
          git pull --ff-only origin main || true
          python3 .github/scripts/swap-tags.py restore \
            $(find src/content/blog -name '*.md' -print)
          # Only commit when there is actually a tags-line delta to ship.
          if ! git diff --quiet src/content/blog/; then
            git -c user.name='github-actions[bot]' \
                -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
                add src/content/blog/
            git -c user.name='github-actions[bot]' \
                -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
                commit -m 'chore(crosspost): restore rich tags after dev.to publish'
            git push origin HEAD:main
          else
            echo 'no tags drift to restore'
          fi
