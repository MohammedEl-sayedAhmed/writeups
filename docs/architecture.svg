<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 780" role="img" aria-labelledby="title desc" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" text-rendering="optimizeLegibility">
  <title id="title">writeups architecture</title>
  <desc id="desc">Source of truth is markdown under src/content/blog/. Pushing to main fans out to three pipelines: Cloudflare Pages builds the Astro site and deploys it to mammar.pages.dev; the crosspost workflow opens an auto-merging PR that publishes or updates the dev.to copy via sinedied/publish-devto, then writes the dev.to article id back into the post frontmatter; the send-webmentions workflow pings every outgoing link's webmention endpoint. A separate manual diagnose-devto workflow reproduces a single publish call against the dev.to API for troubleshooting. test.yml's unit and e2e jobs are required checks that gate the auto-merge PR back to main.</desc>

  <style>
    .lbl      { font-size: 14px; font-weight: 600; }
    .sub      { font-size: 11.5px; font-weight: 400; }
    .edge-lbl { font-size: 11.5px; font-weight: 500; }

    .node { stroke-width: 1.5; }

    .src-fill { fill: #f3e8ff; }
    .src-str  { stroke: #9333ea; }
    .src-txt  { fill: #6b21a8; }

    .gh-fill { fill: #dbeafe; }
    .gh-str  { stroke: #3b82f6; }
    .gh-txt  { fill: #1e40af; }

    .build-fill { fill: #dcfce7; }
    .build-str  { stroke: #16a34a; }
    .build-txt  { fill: #166534; }

    .act-fill { fill: #fef3c7; }
    .act-str  { stroke: #d97706; }
    .act-txt  { fill: #92400e; }

    .out-fill { fill: #ffe4e6; }
    .out-str  { stroke: #e11d48; }
    .out-txt  { fill: #9f1239; }

    .edge      { stroke: #475569; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .edge-dash { stroke: #475569; stroke-width: 1.5; fill: none; stroke-dasharray: 6 4; stroke-linecap: round; stroke-linejoin: round; }
    .edge-txt  { fill: #334155; }
    .edge-bg   { fill: #ffffff; }
    .arrow     { fill: #475569; }

    .group-box { fill: none; stroke: #94a3b8; stroke-width: 1.25; stroke-dasharray: 5 4; }
    .group-lbl { font-size: 12px; font-weight: 600; fill: #64748b; letter-spacing: 0.3px; }

    @media (prefers-color-scheme: dark) {
      .src-fill { fill: #581c87; }
      .src-str  { stroke: #c084fc; }
      .src-txt  { fill: #e9d5ff; }

      .gh-fill { fill: #1e3a8a; }
      .gh-str  { stroke: #60a5fa; }
      .gh-txt  { fill: #bfdbfe; }

      .build-fill { fill: #14532d; }
      .build-str  { stroke: #4ade80; }
      .build-txt  { fill: #bbf7d0; }

      .act-fill { fill: #78350f; }
      .act-str  { stroke: #fbbf24; }
      .act-txt  { fill: #fde68a; }

      .out-fill { fill: #881337; }
      .out-str  { stroke: #fb7185; }
      .out-txt  { fill: #fecdd3; }

      .edge      { stroke: #cbd5e1; }
      .edge-dash { stroke: #cbd5e1; }
      .edge-txt  { fill: #e2e8f0; }
      .edge-bg   { fill: #0f172a; }
      .arrow     { fill: #cbd5e1; }

      .group-box { stroke: #64748b; }
      .group-lbl { fill: #94a3b8; }
    }
  </style>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="arrow"/>
    </marker>
  </defs>

  <!-- Group: Cloudflare Pages -->
  <rect x="540" y="60" width="320" height="180" rx="10" class="group-box"/>
  <text x="554" y="80" class="group-lbl">CLOUDFLARE PAGES</text>

  <!-- Group: GitHub Actions workflows -->
  <rect x="540" y="290" width="320" height="380" rx="10" class="group-box"/>
  <text x="554" y="310" class="group-lbl">GITHUB ACTIONS</text>

  <!-- Author -->
  <rect x="40" y="170" width="200" height="64" rx="8" class="node src-fill src-str"/>
  <text x="140" y="196" text-anchor="middle" class="lbl src-txt">Author</text>
  <text x="140" y="214" text-anchor="middle" class="sub src-txt">npm run dev / build / preview</text>

  <!-- Source: markdown content (cylinder = source of truth) -->
  <g transform="translate(40, 350)">
    <ellipse cx="100" cy="10" rx="100" ry="14" class="node src-fill src-str"/>
    <path d="M0,10 L0,70 A100,14 0 0 0 200,70 L200,10" class="node src-fill src-str"/>
    <ellipse cx="100" cy="10" rx="100" ry="14" class="node src-fill src-str"/>
    <text x="100" y="40" text-anchor="middle" class="lbl src-txt">src/content/blog/*.md</text>
    <text x="100" y="58" text-anchor="middle" class="sub src-txt">Zod-validated frontmatter</text>
  </g>

  <!-- git push -> main -->
  <rect x="310" y="370" width="170" height="64" rx="8" class="node gh-fill gh-str"/>
  <text x="395" y="396" text-anchor="middle" class="lbl gh-txt">git push -&gt; main</text>
  <text x="395" y="414" text-anchor="middle" class="sub gh-txt">protected, linear history</text>

  <!-- Cloudflare build nodes -->
  <rect x="570" y="105" width="260" height="60" rx="8" class="node build-fill build-str"/>
  <text x="700" y="129" text-anchor="middle" class="lbl build-txt">Astro build (Node 22)</text>
  <text x="700" y="147" text-anchor="middle" class="sub build-txt">npm run build -&gt; dist/</text>

  <rect x="570" y="180" width="260" height="50" rx="8" class="node build-fill build-str"/>
  <text x="700" y="200" text-anchor="middle" class="lbl build-txt">satori + resvg</text>
  <text x="700" y="217" text-anchor="middle" class="sub build-txt">per-post /og/&lt;slug&gt;.png</text>

  <!-- crosspost workflow -->
  <rect x="570" y="340" width="260" height="68" rx="8" class="node act-fill act-str"/>
  <text x="700" y="365" text-anchor="middle" class="lbl act-txt">crosspost.yml</text>
  <text x="700" y="382" text-anchor="middle" class="sub act-txt">working branch -&gt; auto-merge PR</text>
  <text x="700" y="398" text-anchor="middle" class="sub act-txt">sinedied/publish-devto (SHA-pinned)</text>

  <!-- test workflow (placed between crosspost and webmentions so the gate arrow is short) -->
  <rect x="570" y="430" width="260" height="58" rx="8" class="node act-fill act-str"/>
  <text x="700" y="453" text-anchor="middle" class="lbl act-txt">test.yml: unit + e2e</text>
  <text x="700" y="470" text-anchor="middle" class="sub act-txt">Vitest + Playwright, required checks</text>

  <!-- send-webmentions workflow -->
  <rect x="570" y="510" width="260" height="58" rx="8" class="node act-fill act-str"/>
  <text x="700" y="533" text-anchor="middle" class="lbl act-txt">send-webmentions.yml</text>
  <text x="700" y="550" text-anchor="middle" class="sub act-txt">POST to outgoing links' endpoints</text>

  <!-- diagnose-devto workflow (manual) -->
  <rect x="570" y="600" width="260" height="48" rx="8" class="node act-fill act-str"/>
  <text x="700" y="623" text-anchor="middle" class="lbl act-txt">diagnose-devto.yml</text>
  <text x="700" y="639" text-anchor="middle" class="sub act-txt">manual workflow_dispatch only</text>

  <!-- Output: site -->
  <circle cx="990" cy="135" r="68" class="node out-fill out-str"/>
  <text x="990" y="130" text-anchor="middle" class="lbl out-txt">mammar</text>
  <text x="990" y="148" text-anchor="middle" class="lbl out-txt">.pages.dev</text>

  <!-- Output: dev.to -->
  <circle cx="990" cy="374" r="56" class="node out-fill out-str"/>
  <text x="990" y="370" text-anchor="middle" class="lbl out-txt">dev.to</text>
  <text x="990" y="388" text-anchor="middle" class="sub out-txt">/mammar</text>

  <!-- Output: webmention endpoints -->
  <circle cx="990" cy="539" r="50" class="node out-fill out-str"/>
  <text x="990" y="536" text-anchor="middle" class="sub out-txt">webmention</text>
  <text x="990" y="552" text-anchor="middle" class="sub out-txt">endpoints</text>

  <!-- Output: dev.to Forem API (for diagnose) -->
  <circle cx="990" cy="624" r="40" class="node out-fill out-str"/>
  <text x="990" y="622" text-anchor="middle" class="sub out-txt">dev.to</text>
  <text x="990" y="636" text-anchor="middle" class="sub out-txt">Forem API</text>

  <!-- ===================== EDGES ===================== -->

  <!-- Author writes -->
  <path d="M140,234 L140,350" class="edge" marker-end="url(#arr)"/>
  <rect x="111" y="282" width="58" height="16" rx="2" class="edge-bg"/>
  <text x="140" y="294" text-anchor="middle" class="edge-lbl edge-txt">authors</text>

  <!-- Source -> push -->
  <path d="M240,402 L310,402" class="edge" marker-end="url(#arr)"/>
  <rect x="252" y="392" width="46" height="16" rx="2" class="edge-bg"/>
  <text x="275" y="404" text-anchor="middle" class="edge-lbl edge-txt">commit</text>

  <!-- push -> cloudflare build (up-right) -->
  <path d="M480,385 L520,385 L520,135 L570,135" class="edge" marker-end="url(#arr)"/>
  <rect x="471" y="224" width="98" height="16" rx="2" class="edge-bg"/>
  <text x="520" y="236" text-anchor="middle" class="edge-lbl edge-txt">webhook deploy</text>

  <!-- push -> crosspost (horizontal, slightly up) -->
  <path d="M480,395 L520,395 L520,374 L570,374" class="edge" marker-end="url(#arr)"/>
  <rect x="430" y="335" width="160" height="16" rx="2" class="edge-bg"/>
  <text x="510" y="347" text-anchor="middle" class="edge-lbl edge-txt">paths: src/content/blog/**</text>

  <!-- push -> test.yml -->
  <path d="M480,415 L525,415 L525,459 L570,459" class="edge" marker-end="url(#arr)"/>
  <rect x="487" y="418" width="74" height="16" rx="2" class="edge-bg"/>
  <text x="524" y="430" text-anchor="middle" class="edge-lbl edge-txt">PR + push</text>

  <!-- push -> webmentions (curve down) -->
  <path d="M480,425 L515,425 L515,539 L570,539" class="edge" marker-end="url(#arr)"/>
  <rect x="485" y="498" width="60" height="16" rx="2" class="edge-bg"/>
  <text x="515" y="510" text-anchor="middle" class="edge-lbl edge-txt">on push</text>

  <!-- cloudflare build -> satori (within group, vertical) -->
  <path d="M700,165 L700,180" class="edge" marker-end="url(#arr)"/>

  <!-- cloudflare build -> site -->
  <path d="M830,135 L922,135" class="edge" marker-end="url(#arr)"/>
  <rect x="855" y="124" width="60" height="16" rx="2" class="edge-bg"/>
  <text x="885" y="136" text-anchor="middle" class="edge-lbl edge-txt">deploy</text>

  <!-- crosspost -> dev.to -->
  <path d="M830,374 L934,374" class="edge" marker-end="url(#arr)"/>
  <rect x="844" y="364" width="76" height="16" rx="2" class="edge-bg"/>
  <text x="882" y="376" text-anchor="middle" class="edge-lbl edge-txt">POST/PUT</text>

  <!-- webmentions -> endpoints -->
  <path d="M830,539 L940,539" class="edge" marker-end="url(#arr)"/>
  <rect x="845" y="529" width="78" height="16" rx="2" class="edge-bg"/>
  <text x="884" y="541" text-anchor="middle" class="edge-lbl edge-txt">webmention</text>

  <!-- diagnose -> dev.to API -->
  <path d="M830,624 L950,624" class="edge" marker-end="url(#arr)"/>
  <rect x="853" y="614" width="68" height="16" rx="2" class="edge-bg"/>
  <text x="887" y="626" text-anchor="middle" class="edge-lbl edge-txt">manual run</text>

  <!-- canonical_url from site to dev.to (so SEO credits the Astro site) -->
  <path d="M958,191 C920,260 920,290 960,330" class="edge" marker-end="url(#arr)"/>
  <rect x="880" y="248" width="100" height="16" rx="2" class="edge-bg"/>
  <text x="930" y="260" text-anchor="middle" class="edge-lbl edge-txt">canonical_url</text>

  <!-- test.yml gates crosspost auto-merge PR (dashed dependency; arrow on left side of column) -->
  <path d="M570,455 L545,455 L545,398 L570,398" class="edge-dash" marker-end="url(#arr)"/>
  <rect x="446" y="368" width="100" height="16" rx="2" class="edge-bg"/>
  <text x="496" y="380" text-anchor="middle" class="edge-lbl edge-txt">required checks</text>

  <!-- WRITEBACK: crosspost -> source (dashed) routes under everything along the bottom -->
  <path d="M570,408 L500,408 L500,720 L140,720 L140,488" class="edge-dash" marker-end="url(#arr)"/>
  <rect x="225" y="712" width="200" height="16" rx="2" class="edge-bg"/>
  <text x="325" y="724" text-anchor="middle" class="edge-lbl edge-txt">writes dev.to id to frontmatter</text>

  <!-- Legend -->
  <g transform="translate(40, 758)">
    <rect x="0" y="-12" width="14" height="14" rx="2" class="src-fill src-str"/>
    <text x="20" y="0" class="sub edge-txt">source</text>
    <rect x="80" y="-12" width="14" height="14" rx="2" class="gh-fill gh-str"/>
    <text x="100" y="0" class="sub edge-txt">git</text>
    <rect x="140" y="-12" width="14" height="14" rx="2" class="build-fill build-str"/>
    <text x="160" y="0" class="sub edge-txt">build / deploy</text>
    <rect x="245" y="-12" width="14" height="14" rx="2" class="act-fill act-str"/>
    <text x="265" y="0" class="sub edge-txt">workflows</text>
    <circle cx="340" cy="-5" r="7" class="out-fill out-str"/>
    <text x="355" y="0" class="sub edge-txt">outputs</text>
    <line x1="420" y1="-5" x2="450" y2="-5" class="edge-dash"/>
    <text x="456" y="0" class="sub edge-txt">writeback / gate</text>
  </g>
</svg>
